<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departure Board</title>
    <link rel="stylesheet" href="styles/site.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>
<body>

    <section id="boards">
        <p>Please wait whilst we load data...</p>
    </section>

    <script type="template/handlebars" id="template-layout">
        <h1>{{name}}</h1>
    </script>

    <script type="template/handlebars" id="template-theme">
        <h2>{{name}}</h2>
    </script>

    <script type="template/handlebars" id="template-board">
        <section class="board {{layout.css}} {{theme.css}}" data-location-city="Wellingborough" data-location-platform="4">
            <header>
                <h1>
                    <span class="prefix">Departures from</span>
                    <span class="location can-scroll">Wellingborough</span>
                </h1>
            </header>
            <ol class="trains">
                <li class="train" itemscope itemtype="https://schema.org/TrainTrip" data-status="On time" data-isEstimated="true" data-isCancelled="false" data-operator="East Midlands Railway">
                    <time itemprop="departureTime" class="departure on-time" datetime="2026-03-11T08:00:00">08:00</time>
                    <span class="prefix">service from</span>
                    <span class="location can-scroll" itemprop="departureStation"><span class="scroller">Wellingborough</span></span>
                    <span class="prefix">to</span>
                    <span class="location destination final can-scroll" itemprop="arrivalStation"><span class="scroller">Corby</span></span>
                    <span class="prefix">on</span>
                    <span class="location platform">
                        <span class="prefix">platform</span>
                        <span class="platform-number">1</span>
                    </span>
                    <span class="prefix status">On time</span>
                    <h3 class="calling-at">Calling at</h3>
                    <ol class="calling-at can-scroll" aria-label="Intermediate and final stops">
                        <li>
                            <span class="location stop can-scroll">Kettering</span>
                            <time class="estimated" datetime="2026-03-11T08:13:00">08:13</time>
                        </li>
                        <li>
                            <span class="location stop can-scroll" itemprop="arrivalStation">Corby</span>
                            <time class="estimated" itemprop="arrivalTime" datetime="2026-03-11T08:22:00">08:22</time>
                        </li>
                    </ol>
                </li>
                <li class="train" itemscope itemtype="https://schema.org/TrainTrip" data-delay="00:10:00" data-status="Est: 08:40" data-isEstimated="true" data-isCancelled="false" data-operator="East Midlands Railway">
                    <time itemprop="departureTime" class="departure on-time" datetime="2026-03-11T08:30:00">08:30</time>
                    <span class="prefix">service from</span>
                    <span class="location can-scroll" itemprop="departureStation"><span class="scroller">Wellingborough</span></span>
                    <span class="prefix">to</span>
                    <span class="location destination final can-scroll" aria-label="Destination" itemprop="arrivalStation"><span class="scroller">Corby</span></span>
                    <span class="prefix">on</span>
                    <span class="location platform">
                        <span class="prefix">platform</span>
                        <span class="platform-number">1</span>
                    </span>
                    <span class="prefix status">On time</span>
                    <h3 class="calling-at">Calling at</h3>
                    <ol class="calling-at can-scroll" aria-label="Intermediate and final stops">
                        <li>
                            <span class="location stop can-scroll">Kettering</span>
                            <time class="estimated" datetime="2026-03-11T08:33:00">08:33</time>
                        </li>
                        <li>
                            <span class="location stop can-scroll" itemprop="arrivalStation">Corby</span>
                            <time class="estimated" itemprop="arrivalTime" datetime="2026-03-11T08:52:00">08:52</time>
                        </li>
                    </ol>
                </li>
                <li class="train" itemscope itemtype="https://schema.org/TrainTrip" data-delay="00:10:00" data-status="Cancelled" data-isEstimated="true" data-isCancelled="true">
                    <time itemprop="departureTime" class="departure" datetime="2026-03-11T09:10:00">09:10</time>
                    <span class="prefix">service from</span>
                    <span class="location can-scroll" itemprop="departureStation"><span class="scroller">Wellingborough</span></span>
                    <span class="prefix">to</span>
                    <span class="location destination final can-scroll" itemprop="arrivalStation"><span class="scroller">Corby</span></span>
                    <span class="prefix">on</span>
                    <span class="location platform">
                        <span class="prefix">platform</span>
                        <span class="platform-number">1</span>
                    </span>
                    <span class="prefix status">Cancelled</span>
                    <h3 class="calling-at">Calling at</h3>
                    <ol class="calling-at can-scroll" aria-label="Intermediate and final stops">
                        <li>
                            <span class="location stop can-scroll">Kettering</span>
                            <time class="estimated" datetime="2026-03-11T09:13:00">09:13</time>
                        </li>
                        <li>
                            <span class="location stop can-scroll" itemprop="arrivalStation">Corby</span>
                            <time class="estimated" itemprop="arrivalTime" datetime="2026-03-11T09:22:00">09:22</time>
                        </li>
                    </ol>
                </li>
            </ol>
        </section>
    </script>


    <script src="scripts/handlebars.min.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/next-train.js"></script>
    <script src="scripts/scrolling.js"></script>
</body>
</html>
