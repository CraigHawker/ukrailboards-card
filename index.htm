<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departure Board</title>
    <link rel="stylesheet" href="styles/site.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>
<body>

    <section id="boards">
        <p>Please wait whilst we load data...</p>
    </section>

    <script type="template/handlebars" id="template-layout">
        <h1>{{name}}</h1>
    </script>

    <script type="template/handlebars" id="template-theme">
        <h2>{{name}}</h2>
    </script>

    <script type="template/handlebars" id="template-board">
        <section class="board {{layout.css}} {{theme.css}}" data-location-city="{{board.locationName}}" data-location-platform="{{firstPlatform board.trainServices}}">
            <header>
                <h1>
                    <span class="prefix">Departures from</span>
                    <span class="location can-scroll">{{board.locationName}}</span>
                </h1>
            </header>
            <ol class="trains">
                {{#each board.trainServices}}
                <li class="train" itemscope itemtype="https://schema.org/TrainTrip" data-status="{{statusText this}}" data-isEstimated="{{isEstimated this}}" data-isCancelled="{{isCancelled this}}" data-operator="{{operator}}">
                    <time itemprop="departureTime" class="departure {{departureClass this}}" datetime="{{serviceDateTime this ../board.generatedAt}}">{{std}}</time>
                    <span class="prefix">service from</span>
                    <span class="location can-scroll" itemprop="departureStation"><span class="scroller">{{../board.locationName}}</span></span>
                    <span class="prefix">to</span>
                    <span class="location destination final can-scroll" itemprop="arrivalStation"><span class="scroller">{{destinationName this}}</span></span>
                    <span class="prefix">on</span>
                    <span class="location platform">
                        <span class="prefix">platform</span>
                        <span class="platform-number">{{platform}}</span>
                    </span>
                    <span class="prefix status">{{statusText this}}</span>
                    <h3 class="calling-at">Calling at</h3>
                    <ol class="calling-at can-scroll" aria-label="Intermediate and final stops">
                        {{#each (callingPoints this)}}
                        <li>
                            <span class="location stop can-scroll{{#if (isLast @index (callingPoints ../this))}} final{{/if}}"{{#if (isLast @index (callingPoints ../this))}} itemprop="arrivalStation"{{/if}}>{{locationName}}</span>
                            <time class="estimated"{{#if (isLast @index (callingPoints ../this))}} itemprop="arrivalTime"{{/if}} datetime="{{callingPointDateTime this @root.board.generatedAt}}">{{displayTime this}}</time>
                        </li>
                        {{/each}}
                    </ol>
                </li>
                {{/each}}
            </ol>
        </section>
    </script>


    <script src="scripts/handlebars.min.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/next-train.js"></script>
    <script src="scripts/scrolling.js"></script>
</body>
</html>
